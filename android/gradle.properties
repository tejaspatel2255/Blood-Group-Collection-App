org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Fix for Kotlin incremental cache crash on Windows when Pub cache (C:\) and project (D:\) are on different drives.
# Kotlin's RelocatableFileToPathConverter cannot make cross-drive relative paths.
kotlin.incremental=false
